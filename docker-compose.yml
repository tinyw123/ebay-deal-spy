version: '3.8'

services:
  dealspy:
    build: .
    container_name: dealspy
    ports:
      # Map host port 8090 to container port 8000.
      # You can change the first "8090" if you have a port conflict on your NAS.
      - "8090:8000"
    volumes:
      # Persistent mount for database files (trackers.json, deals.json)
      - ./data:/app/data
    restart: unless-stopped
